services:
    app:
        container_name: service-front

        build:
            context: ../
            dockerfile: service-front/docker/node/Dockerfile
            target: development
            args:
                # 公開情報のみビルド時に渡す（NEXT_PUBLIC_*）
                NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}

        ports:
            - "3000:3000"

        volumes:
            # リポジトリルートをマウント（workspace 構造を維持）
            - ../:/app
            # node_modules はコンテナ側を使う（ホスト OS との差異を防ぐ）
            - /app/node_modules
            - /app/service-front/node_modules

        working_dir: /app/service-front

        environment:
            # 開発モード
            - NODE_ENV=development

            # 公開情報
            - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}

            # コンテナ内からホストの Supabase に接続するための URL（host.docker.internal）。
            # ブラウザ側は NEXT_PUBLIC_SUPABASE_URL（localhost）を使い、
            # Server Components / Server Actions / middleware ではこちらを優先する。
            - SUPABASE_INTERNAL_URL=http://host.docker.internal:54321

            # SSL証明書検証（自己署名証明書を使う場合のみ有効化）
            # - NODE_EXTRA_CA_CERTS=/app/certs/ca-cert.pem

        # Linux でも host.docker.internal を host-gateway で解決可能にする
        # （Docker Desktop の Mac/Windows では既定で動作するが明示することで Linux にも対応）
        extra_hosts:
            - "host.docker.internal:host-gateway"

        command: sh -c "npm run dev:https"

        # 開発環境設定
        restart: "no" # エラー時に自動再起動しない
        tty: true # docker exec -it でシェル使用可能
        stdin_open: true # 対話モード有効

        # ヘルスチェック（オプション）
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:3000"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
